name: Deploy to S3

on:
  push:
    branches:
      - main
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: コード取得
        uses: actions/checkout@v3

      - name: commit番号取得
        id: vars
        run: echo "COMMIT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: index.htmlにバージョン付与
        run: |
          sed -i "s|app.js|app.js?v=${COMMIT_SHA}|g" index.html
          sed -i "s|style.css|style.css?v=${COMMIT_SHA}|g" index.html

      - name: AWS認証
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: S3へ同期（通常ファイル）
        run: |
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            echo "Deploy to PROD"
            BUCKET="darts-app-prod-bucket"
          else
            echo "Deploy to DEV"
            BUCKET="darts-app-bucket"
          fi

          aws s3 sync . s3://$BUCKET \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*"

      - name: index.htmlを最適化（キャッシュ無効＋文字コード）
        run: |
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            echo "Deploy to PROD"
            BUCKET="darts-app-prod-bucket"
          else
            echo "Deploy to DEV"
            BUCKET="Darts-app-bucket"
          fi

          aws s3 cp index.html s3://$BUCKET/index.html \
            --content-type "text/html; charset=utf-8" \
            --cache-control "no-cache, no-store, must-revalidate"
      - name: index.html確認
        run: cat index.html
